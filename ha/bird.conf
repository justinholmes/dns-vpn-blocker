# BIRD2 configuration for VPN/DNS Blocker HA
# Tokens like ${NODE_IP} are substituted by the container entrypoint at startup.
# Do not edit those placeholders — set the corresponding environment variables instead.

log syslog all;
debug protocols { states, routes };

router id ${NODE_IP};

# ── Core protocols ─────────────────────────────────────────────────────────

protocol device {}

# Redistribute loopback addresses (the VIP lives on lo) into BIRD's routing table
protocol direct {
  interface "lo";
}

# Push selected routes into the kernel FIB so the OS can forward traffic
protocol kernel {
  ipv4 {
    export all;
    import none;   # we don't need to learn kernel routes
    merge paths on; # ECMP when multiple paths exist
  };
}

# ── VIP static route ───────────────────────────────────────────────────────
# The entrypoint script enables this protocol when the health check passes
# and disables it when vpn-dns-blocker becomes unhealthy.
# BIRD withdraws the BGP advertisement the moment the protocol is disabled.

protocol static VIP {
  ipv4;
  disabled;  # start withdrawn — entrypoint enables once healthy

  route ${VIP}/32 blackhole;
}

# ── BGP session to upstream router ────────────────────────────────────────

protocol bgp upstream {
  description "Upstream router — announces VIP when healthy";

  neighbor ${BGP_UPSTREAM_IP} as ${BGP_UPSTREAM_AS};
  local as ${BGP_LOCAL_AS};

  hold time 9;           # fail over in ~9s if keepalives are lost
  keepalive time 3;

  ipv4 {
    import none;         # we don't pull routes from upstream
    export where source = RTS_STATIC;
  };

  # Reconnect quickly on session loss
  error wait time 1, 10;
  error forget time 30;
}
